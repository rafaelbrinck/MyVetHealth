<div class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <p class="text-neutral-500 dark:text-neutral-400 font-medium">{{ tutor().saudacao }},</p>
      <h1 class="text-2xl font-extrabold text-[#0da193] dark:text-teal-400">{{ tutor().nome }} 👋</h1>
    </div>
    <a routerLink="/tutor/perfil" class="w-12 h-12 bg-teal-100 dark:bg-teal-900/50 text-teal-700 dark:text-teal-400 rounded-full flex items-center justify-center font-bold text-lg shadow-sm hover:scale-105 transition-transform">
      {{ tutor().nome.charAt(0) }}
    </a>
  </div>

  <div *ngIf="alertaImportante().ativo" class="bg-gradient-to-r from-orange-400 to-orange-500 rounded-3xl p-5 text-white shadow-md relative overflow-hidden">
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
    <div class="flex items-start gap-4 relative z-10">
      <div class="text-3xl bg-white/20 p-2 rounded-2xl">💉</div>
      <div>
        <h3 class="font-bold text-lg mb-1">Atenção!</h3>
        <p class="text-orange-50 text-sm font-medium mb-3">{{ alertaImportante().mensagem }}</p>
        <a routerLink="/tutor/pet-perfil" class="bg-white text-orange-600 px-4 py-2 rounded-full text-xs font-bold hover:bg-orange-50 transition-colors shadow-sm inline-block">
          {{ alertaImportante().acaoTexto }}
        </a>
      </div>
    </div>
  </div>

  <div>
    <h2 class="text-lg font-bold text-neutral-800 dark:text-white mb-4">Acesso Rápido</h2>
    <div class="grid grid-cols-2 gap-4">
      <a routerLink="/tutor/consultas" class="bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 p-4 rounded-3xl shadow-sm hover:shadow-md transition-all flex flex-col items-center justify-center gap-2">
        <span class="text-3xl bg-teal-50 dark:bg-teal-900/30 p-3 rounded-2xl w-full text-center">📅</span>
        <span class="text-sm font-bold text-neutral-700 dark:text-neutral-200">Consultas</span>
      </a>
      <a routerLink="/tutor/receitas" class="bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 p-4 rounded-3xl shadow-sm hover:shadow-md transition-all flex flex-col items-center justify-center gap-2">
        <span class="text-3xl bg-teal-50 dark:bg-teal-900/30 p-3 rounded-2xl w-full text-center">💊</span>
        <span class="text-sm font-bold text-neutral-700 dark:text-neutral-200">Receitas</span>
      </a>
    </div>
  </div>

  <div>
    <div class="flex justify-between items-end mb-4">
      <h2 class="text-lg font-bold text-neutral-800 dark:text-white">Meus Pets</h2>
      <a routerLink="/tutor/pets" class="text-sm font-bold text-[#0da193] dark:text-teal-400">Ver todos</a>
    </div>
    <div class="space-y-3">
      <a *ngFor="let pet of meusPets()" routerLink="/tutor/pet-perfil" class="flex items-center gap-4 bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 p-4 rounded-3xl shadow-sm hover:shadow-md transition-all cursor-pointer">
        <div class="w-14 h-14 bg-neutral-50 dark:bg-neutral-800 rounded-2xl flex items-center justify-center text-3xl">{{ pet.foto }}</div>
        <div class="flex-1">
          <h3 class="text-lg font-bold text-neutral-800 dark:text-white">{{ pet.nome }}</h3>
          <p class="text-xs text-neutral-500 dark:text-neutral-400 font-medium">{{ pet.raca }}</p>
        </div>
        <div class="text-neutral-400 dark:text-neutral-500 font-bold">➔</div>
      </a>
    </div>
  </div>
</div>
