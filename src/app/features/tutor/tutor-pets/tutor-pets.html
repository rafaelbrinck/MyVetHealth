<div class="pb-24 p-6 space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-extrabold text-neutral-800">Meus Pets 🐾</h1>
      <p class="text-neutral-500 font-medium text-sm mt-1">Gerencie a saúde dos seus companheiros.</p>
    </div>
  </div>

  <div class="space-y-4">
    
    <a *ngFor="let pet of meusPets()" 
       routerLink="/tutor/pet-perfil" 
       class="block bg-white border border-neutral-100 rounded-3xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden">
      
      <div class="absolute left-0 top-0 bottom-0 w-1.5" 
           [ngClass]="pet.status === 'Saudável' ? 'bg-emerald-400' : 'bg-orange-400'">
      </div>

      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-neutral-50 rounded-2xl flex items-center justify-center text-4xl shadow-inner">
          {{ pet.foto }}
        </div>
        
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <h3 class="text-xl font-bold text-neutral-800">{{ pet.nome }}</h3>
            <span class="text-xs font-bold px-2 py-1 rounded-md"
                  [ngClass]="pet.status === 'Saudável' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'">
              {{ pet.status }}
            </span>
          </div>
          <p class="text-sm text-neutral-500 font-medium">{{ pet.raca }}</p>
          
          <div class="mt-3 flex items-center gap-2 text-xs text-neutral-600 font-medium bg-neutral-50 p-2 rounded-xl">
            <span>💉</span>
            <span>Próx: {{ pet.proximaVacina }}</span>
          </div>
        </div>
      </div>
    </a>

  </div>

  <button (click)="adicionarPet()" class="w-full bg-teal-50 hover:bg-teal-100 text-[#0da193] border-2 border-dashed border-teal-200 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 mt-4">
    <span class="text-xl">+</span> Adicionar Novo Pet
  </button>

</div>
