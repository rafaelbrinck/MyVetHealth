<div class="pb-24 p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-extrabold text-neutral-800 dark:text-white">Meus Pets 🐾</h1>
      <p class="text-neutral-500 dark:text-neutral-400 font-medium text-sm mt-1">Gerencie a saúde dos seus companheiros.</p>
    </div>
  </div>

  <div class="space-y-4">
    <a *ngFor="let pet of meusPets()" routerLink="/tutor/pet-perfil" class="block bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 rounded-3xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden">
      <div class="absolute left-0 top-0 bottom-0 w-1.5" [ngClass]="pet.status === 'Saudável' ? 'bg-emerald-400' : 'bg-orange-400'"></div>
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-neutral-50 dark:bg-neutral-800 rounded-2xl flex items-center justify-center text-4xl shadow-inner border border-neutral-100 dark:border-neutral-700">{{ pet.foto }}</div>
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <h3 class="text-xl font-bold text-neutral-800 dark:text-white">{{ pet.nome }}</h3>
            <span class="text-xs font-bold px-2 py-1 rounded-md" [ngClass]="pet.status === 'Saudável' ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400'">{{ pet.status }}</span>
          </div>
          <p class="text-sm text-neutral-500 dark:text-neutral-400 font-medium">{{ pet.raca }}</p>
          <div class="mt-3 flex items-center gap-2 text-xs text-neutral-600 dark:text-neutral-400 font-medium bg-neutral-50 dark:bg-neutral-800/50 p-2 rounded-xl">
            <span>💉</span>
            <span>Próx: {{ pet.proximaVacina }}</span>
          </div>
        </div>
      </div>
    </a>
  </div>

  <button (click)="abrirModal()" class="w-full bg-teal-50 dark:bg-teal-900/20 hover:bg-teal-100 dark:hover:bg-teal-900/40 text-[#0da193] dark:text-teal-400 border-2 border-dashed border-teal-200 dark:border-teal-700/50 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 mt-4">
    <span class="text-xl">+</span> Adicionar Novo Pet
  </button>
</div>

<div *ngIf="isModalOpen()" class="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/60 backdrop-blur-md transition-opacity duration-300 p-6">
  <div class="bg-white dark:bg-neutral-900 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl border border-white/10">
    <div class="bg-[#0da193] p-5 flex justify-between items-center text-white">
      <h3 class="font-bold text-lg">Novo Pet 🐾</h3>
      <button (click)="fecharModal()" class="text-teal-100 hover:text-white text-2xl font-bold leading-none">&times;</button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs font-bold text-neutral-500 dark:text-neutral-400 uppercase tracking-wider mb-1.5">Nome do Pet</label>
        <input #inputNome type="text" placeholder="Ex: Rex" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-400 outline-none text-neutral-800 dark:text-white font-medium">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-neutral-500 dark:text-neutral-400 uppercase tracking-wider mb-1.5">Espécie</label>
          <select #inputEspecie class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-400 outline-none text-neutral-800 dark:text-white font-medium appearance-none">
            <option value="Cachorro">Cachorro</option>
            <option value="Gato">Gato</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-neutral-500 dark:text-neutral-400 uppercase tracking-wider mb-1.5">Raça</label>
          <input #inputRaca type="text" placeholder="Ex: Poodle" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-400 outline-none text-neutral-800 dark:text-white font-medium">
        </div>
      </div>
      <div class="pt-2">
        <button (click)="salvarPet(inputNome.value, inputEspecie.value, inputRaca.value)" class="w-full bg-[#0da193] hover:bg-[#006064] text-white font-bold py-4 rounded-xl transition-all shadow-md transform hover:-translate-y-0.5">Salvar Pet</button>
      </div>
    </div>
  </div>
</div>
