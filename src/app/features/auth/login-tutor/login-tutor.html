<div class="min-h-screen bg-neutral-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="flex justify-center text-6xl drop-shadow-sm mb-4">
      🐾
    </div>
    <h2 class="text-center text-3xl font-extrabold text-neutral-900">
      My Pet Health
    </h2>
    <p class="mt-2 text-center text-sm text-neutral-600 font-medium">
      A plataforma unificada para clínicas e tutores.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="bg-white/80 backdrop-blur-xl py-8 px-4 shadow-2xl sm:rounded-3xl sm:px-10 border border-white/40">
      
      <div class="space-y-6">
        
        <div>
          <label class="block text-sm font-semibold text-neutral-700 mb-1.5">
            E-mail de acesso
          </label>
          <div class="mt-1">
            <input #inputEmail type="email" placeholder="exemplo@email.com" class="appearance-none block w-full px-5 py-3.5 border border-neutral-200 rounded-xl shadow-sm placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-[#0da193] focus:border-transparent transition-all font-medium text-neutral-800">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-neutral-700 mb-1.5">
            Senha
          </label>
          <div class="mt-1">
            <input #inputSenha type="password" placeholder="••••••••" class="appearance-none block w-full px-5 py-3.5 border border-neutral-200 rounded-xl shadow-sm placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-[#0da193] focus:border-transparent transition-all font-medium text-neutral-800">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="lembrar-me" type="checkbox" class="h-4 w-4 text-[#0da193] focus:ring-[#0da193] border-neutral-300 rounded cursor-pointer">
            <label for="lembrar-me" class="ml-2 block text-sm text-neutral-700 font-medium cursor-pointer">
              Lembrar-me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-bold text-[#0da193] hover:text-[#006064] transition-colors">
              Esqueceu a senha?
            </a>
          </div>
        </div>

        <div>
          <button (click)="fazerLogin(inputEmail.value, inputSenha.value)" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-base font-bold text-white bg-[#0da193] hover:bg-[#006064] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#0da193] transition-all transform hover:-translate-y-0.5">
            Entrar no Sistema
          </button>
        </div>
        
      </div>
      
    </div>
  </div>
</div>
