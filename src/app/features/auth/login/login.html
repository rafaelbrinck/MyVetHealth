<div class="w-full max-w-md">
  
  <div class="mb-8 text-center">
    <h1 class="text-4xl font-extrabold text-teal-600 tracking-tight">
      My Pet Health
    </h1>
    <p class="text-slate-500 mt-2">A saúde do seu pet em boas mãos</p>
  </div>

  <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 w-sm sm:w-md">
    
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Entrar</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <div *ngIf="errorMessage" class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100 text-center">
        {{ errorMessage }}
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email"
          class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-teal-500 focus:outline-none transition-all"
          [ngClass]="emailError ? 'border-red-400 focus:ring-red-500' : 'border-gray-300'"
          placeholder="seu@email.com"
        >
        <span *ngIf="emailError" class="text-xs text-red-500 mt-1 block">
          Digite um e-mail válido.
        </span>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password"
          class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-teal-500 focus:outline-none transition-all"
          [ngClass]="passwordError ? 'border-red-400 focus:ring-red-500' : 'border-gray-300'"
          placeholder="••••••••"
        >
        <span *ngIf="passwordError" class="text-xs text-red-500 mt-1 block">
          A senha deve ter no mínimo 6 caracteres.
        </span>
      </div>

      <div class="flex justify-end">
        <a href="#" class="text-sm text-teal-600 hover:text-teal-700 font-medium">Esqueceu a senha?</a>
      </div>

      <button 
        type="submit" 
        [disabled]="isLoading"
        class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg hover:bg-teal-700 transition-colors disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center"
      >
        <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>

    </form>
  </div>
</div>
