<div class="min-h-screen bg-slate-100 flex overflow-hidden">

  @if (isMobileMenuOpen()) {
    <div 
      class="fixed inset-0 bg-slate-900/50 z-20 md:hidden transition-opacity" 
      (click)="closeMenu()">
    </div>
  }

  <aside 
    class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col z-30 transition-transform duration-300 ease-in-out md:translate-x-0"
    [class.-translate-x-full]="!isMobileMenuOpen()">
    
    <div class="flex items-center justify-between p-6 border-b border-slate-800">
      <h1 class="text-xl font-bold text-teal-400">Painel Clínica</h1>
      <button (click)="toggleMenu()" class="md:hidden text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a routerLink="/clinica/recepcao" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        🛎️ Recepção
      </a>
      <a routerLink="/clinica/dashboard" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        📊 Dashboard
      </a>
      <a routerLink="/clinica/prontuarios" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        🩺 Prontuários
      </a>
      <a routerLink="/clinica/pacientes" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        🐾 Pacientes
      </a>
      <a routerLink="/clinica/equipe" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        👥 Equipe
      </a>
        <a routerLink="/clinica/vacinas" routerLinkActive="bg-slate-800 text-teal-400" (click)="closeMenu()" class="block p-3 rounded-lg hover:bg-slate-800 transition-colors">
        💉 Vacinas
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800 text-sm">
      <button class="flex items-center w-full p-2 text-slate-400 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Sair do sistema
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col w-full md:ml-64 transition-all duration-300 min-h-screen">
    
    <header class="bg-white shadow-sm p-4 md:hidden flex items-center sticky top-0 z-10">
      <button (click)="toggleMenu()" class="p-2 mr-4 text-slate-600 focus:outline-none focus:ring-2 focus:ring-teal-500 rounded-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <h2 class="font-bold text-slate-800">My Pet Health</h2>
    </header>

    <div class="p-4 md:p-8 flex-1">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
